name: Public-safe sprint interest / 公开安全冲刺合作意向
description: Submit 7-day sprint setup interest / 提交 7 天冲刺搭建意向 without posting private payment or customer data.
title: "Sprint interest: "
labels:
  - order-interest
  - sprint-interest
body:
  - type: markdown
    attributes:
      value: |
        Use this form only for public-safe initial sprint setup interest.
        中文：此表单仅用于提交公开安全的 7 天冲刺搭建合作意向。
        Do not post payment data, private student data, passwords, internal records, or non-public customer data.
        请勿填写付款数据、学生隐私数据、密码、内部记录或非公开客户数据。
        Sprint interest is routed for manual contract review first and is not income.
        中文：冲刺意向会先进入人工合同审核，不是收入记录。
  - type: input
    id: company
    attributes:
      label: Company
      description: Public business or school name. 中文：公开机构或学校名称。
      placeholder: Ready School
    validations:
      required: true
  - type: input
    id: buyer_legal_name
    attributes:
      label: Buyer legal name
      description: Legal buyer name if known. 中文：如已知，请填写购买方法定名称。
      placeholder: Ready Education Ltd
    validations:
      required: true
  - type: input
    id: business_public_source
    attributes:
      label: Business public source
      description: Public website or profile for the buyer. 中文：购买方公开网站或公开资料页。
      placeholder: https://example.com
    validations:
      required: true
  - type: dropdown
    id: package_interest
    attributes:
      label: Package interest
      options:
        - sprint
    validations:
      required: true
  - type: dropdown
    id: data_authorization_status
    attributes:
      label: Data authorization status
      options:
        - public-only
        - sample-data-approved
        - internal-data-approval-pending
    validations:
      required: true
  - type: dropdown
    id: authority_confirmed
    attributes:
      label: Authority confirmed
      description: Confirm you have authority to discuss this workflow for the buyer. 中文：确认你有权代表购买方讨论该流程。
      options:
        - "yes"
        - "no"
    validations:
      required: true
  - type: dropdown
    id: consent_to_contact
    attributes:
      label: Consent to contact
      description: Consent to be contacted through your public GitHub profile for this request. 中文：同意通过你的公开 GitHub 资料就此请求联系你。
      options:
        - "yes"
        - "no"
    validations:
      required: true
